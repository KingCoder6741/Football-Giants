<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Madrid & Man United</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .club { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; transition: 0.5s; }
        .real { background: #FEFEFE; color: #001A4E; border-right: 5px solid #EEAC0F; }
        .united { background: #DA020E; color: #FFE500; }
        .club:hover { flex: 1.5; }
        h1 { font-size: 3rem; }
    </style>
</head>
<body>
    <div class="container">
        <section class="club real">
            <h1>Real Madrid</h1>
            <p>15x Champions League Winners</p>
        </section>
        <section class="club united">
            <h1>Man United</h1>
            <p>The Red Devils</p>
        </section>
    </div>
</body>
</html>
