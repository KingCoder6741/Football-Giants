<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Giants | 2026 Interactive</title>
    <!-- Upgraded Font Awesome Link -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root {
            --rm-navy: #001A4E;
            --rm-gold: #EEAC0F;
            --mu-red: #DA020E;
            --mu-yellow: #FFE500;
            --psg-blue: #004170;
            --psg-red: #E30613;
            --text-light: #ffffff;
            --bg-dark: #050505;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Improved Navbar */
        .navbar {
            position: fixed; top: 0; width: 100%;
            padding: 15px 50px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            display: flex; justify-content: space-between;
            align-items: center; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
        }
        .logo { font-weight: bold; font-size: 1.2rem; letter-spacing: 2px; }
        
        /* Hero Section */
        .hero { display: flex; height: 100vh; padding-top: 60px; }
        
        @media (max-width: 768px) { .hero { flex-direction: column; } }
        
        .panel {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: var(--transition);
            position: relative;
            cursor: pointer;
            padding: 20px;
            overflow: hidden;
        }

        /* Panel Styling */
        .panel.rm { background: #080d1a; border-right: 1px solid #222; }
        .panel.mu { background: #1a0808; }
        
        .panel:hover { flex: 1.5; }
        
        .club-name {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            margin: 0; text-transform: uppercase;
            letter-spacing: -2px; line-height: 0.9;
            text-align: center;
            font-weight: 800;
            transition: var(--transition);
        }
        
        .panel:hover .club-name { transform: scale(1.05); }

        /* Subtle Glow Effect */
        .panel.rm:hover { box-shadow: inset 0 0 50px rgba(238, 172, 15, 0.1); }
        .panel.mu:hover { box-shadow: inset 0 0 50px rgba(218, 2, 14, 0.1); }

    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">GIANTS<span style="color:var(--rm-gold)">26</span></div>
        <div class="menu"><i class="fas fa-bars"></i></div>
    </nav>

    <section class="hero">
        <div class="panel rm">
            <h1 class="club-name" style="color: #fff">Real<br>Madrid</h1>
        </div>
        <div class="panel mu">
            <h1 class="club-name" style="color: #fff">Man<br>Utd</h1>
        </div>
    </section>

</body>
</html>
